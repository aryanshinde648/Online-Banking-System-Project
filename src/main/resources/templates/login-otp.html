<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Login Verification | Online Banking System</title>
    <link th:href="@{/css/headerbar.css}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e3a5f 0%, #0f2444 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .otp-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.3);
            border: none; overflow: hidden;
        }
        .otp-card-header {
            background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
            padding: 2rem; text-align: center; color: white;
        }
        .otp-card-header .icon-wrap {
            width: 70px; height: 70px; border-radius: 50%;
            background: rgba(255,255,255,0.15);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1rem; font-size: 1.8rem;
        }
        .otp-card-header h2 { font-weight: 800; font-size: 1.6rem; margin: 0 0 0.3rem; }
        .otp-card-header p  { font-size: 0.9rem; opacity: 0.85; margin: 0; }

        .card-body-inner { padding: 2rem 2.5rem 2.5rem; }

        /* Alert banners */
        .alert-custom {
            border-radius: 10px; border: none; padding: 0.85rem 1.2rem;
            font-size: 0.88rem; font-weight: 500; margin-bottom: 1.5rem;
            display: flex; align-items: center; gap: 0.6rem;
        }
        .alert-error   { background: #fef2f2; color: #b91c1c; border-left: 4px solid #ef4444; }
        .alert-success { background: #f0fdf4; color: #15803d; border-left: 4px solid #22c55e; }

        /* Email chip */
        .email-chip {
            background: linear-gradient(135deg, #eff6ff, #dbeafe);
            border: 1.5px dashed #3b82f6; border-radius: 10px;
            padding: 0.6rem 1rem; text-align: center;
            font-size: 0.92rem; font-weight: 600; color: #1d4ed8;
            margin-bottom: 1.5rem; letter-spacing: 0.02em;
        }

        /* 6-digit inputs */
        .otp-inputs {
            display: flex; gap: 0.6rem; justify-content: center;
            margin-bottom: 1.5rem;
        }
        .otp-inputs input {
            width: 50px; height: 58px; text-align: center;
            font-size: 1.5rem; font-weight: 700; color: #1e293b;
            border: 2.5px solid #e2e8f0; border-radius: 12px;
            outline: none; transition: all 0.2s; background: #f8fafc;
        }
        .otp-inputs input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37,99,235,0.15);
            background: #fff;
        }
        .otp-inputs input.filled { border-color: #2563eb; background: #eff6ff; }

        /* Submit button */
        .btn-verify {
            width: 100%;
            background: linear-gradient(90deg, #1e3a5f 0%, #2563eb 100%);
            border: none; border-radius: 10px; padding: 0.85rem;
            font-weight: 700; color: white; font-size: 1rem;
            transition: all 0.25s; letter-spacing: 0.01em;
        }
        .btn-verify:hover {
            opacity: 0.88; transform: scale(1.01);
            box-shadow: 0 8px 20px rgba(37,99,235,0.4); color: white;
        }
        .btn-verify:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

        /* Resend */
        .resend-section { text-align: center; margin-top: 1.2rem; }
        .resend-section small { color: #64748b; font-size: 0.88rem; }
        #resendBtn {
            background: none; border: none; color: #2563eb; font-weight: 600;
            font-size: 0.88rem; cursor: pointer; text-decoration: underline;
            padding: 0; transition: color 0.2s;
        }
        #resendBtn:hover { color: #1d4ed8; }
        #resendBtn:disabled { color: #94a3b8; cursor: not-allowed; text-decoration: none; }
        #countdownWrap { color: #94a3b8; font-size: 0.85rem; }

        .security-badge {
            display: flex; align-items: center; gap: 0.5rem;
            background: #f0fdf4; border-radius: 8px; padding: 0.6rem 0.9rem;
            margin-bottom: 1.5rem; font-size: 0.82rem; color: #15803d;
        }

        .back-link { color: #64748b; font-size: 0.88rem; text-decoration: none; }
        .back-link:hover { color: #2563eb; }

        /* Toast */
        #toastBox {
            position: fixed; top: 1.5rem; right: 1.5rem; z-index: 9999;
            display: flex; flex-direction: column; gap: 0.5rem; pointer-events: none;
        }
        .toast-msg {
            animation: slideIn 0.3s ease; padding: 0.75rem 1.4rem; border-radius: 10px;
            font-weight: 600; font-size: 0.88rem; color: white;
            box-shadow: 0 6px 20px rgba(0,0,0,0.18); pointer-events: auto;
        }
        .toast-success { background: #16a34a; }
        .toast-error   { background: #dc2626; }
        @keyframes slideIn {
            from { transform: translateX(80px); opacity: 0; }
            to   { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body class="has-fixed-header">
    <div th:replace="~{headerbar-customer :: auth-nav}"></div>
    <div id="toastBox"></div>

    <div class="container" style="max-width: 460px; margin: 3rem auto;">
        <div class="otp-card">

            <!-- Card Header -->
            <div class="otp-card-header">
                <div class="icon-wrap">
                    <i class="fas fa-lock"></i>
                </div>
                <h2>Two-Factor Authentication</h2>
                <p>Secure your login with a one-time password</p>
            </div>

            <!-- Card Body -->
            <div class="card-body-inner">

                <!-- Security badge -->
                <div class="security-badge">
                    <i class="fas fa-shield-check"></i>
                    <span>Your account is protected with 2FA verification</span>
                </div>

                <!-- Error alert -->
                <div th:if="${error}" class="alert-custom alert-error">
                    <i class="fas fa-exclamation-circle"></i>
                    <span th:text="${error}"></span>
                </div>

                <!-- Email chip -->
                <div class="email-chip">
                    <i class="fas fa-envelope me-2"></i>
                    OTP sent to: <span th:text="${maskedEmail ?: 'your email'}"></span>
                </div>

                <!-- OTP Form -->
                <form th:action="@{/customer/login-otp}" method="post" id="otpForm">
                    <input type="hidden" name="email" th:value="${email}">

                    <label style="font-size:0.82rem;font-weight:600;color:#475569;margin-bottom:0.5rem;display:block;">
                        Enter the 6-digit OTP
                    </label>

                    <div class="otp-inputs" id="otpInputs">
                        <input type="text" maxlength="1" class="otp-box" id="d0" inputmode="numeric" autocomplete="one-time-code">
                        <input type="text" maxlength="1" class="otp-box" id="d1" inputmode="numeric">
                        <input type="text" maxlength="1" class="otp-box" id="d2" inputmode="numeric">
                        <input type="text" maxlength="1" class="otp-box" id="d3" inputmode="numeric">
                        <input type="text" maxlength="1" class="otp-box" id="d4" inputmode="numeric">
                        <input type="text" maxlength="1" class="otp-box" id="d5" inputmode="numeric">
                    </div>

                    <input type="hidden" name="otp" id="otpHidden">

                    <button type="submit" class="btn-verify" id="verifyBtn" disabled>
                        <i class="fas fa-right-to-bracket me-2"></i>Complete Login
                    </button>
                </form>

                <!-- Resend -->
                <div class="resend-section mt-3">
                    <small>Didn't receive the code? </small>
                    <button id="resendBtn" disabled onclick="resendOtp()">Resend OTP</button>
                    <div id="countdownWrap"></div>
                </div>

                <div class="text-center mt-3">
                    <a href="/login-customer" class="back-link">
                        <i class="fas fa-arrow-left me-1"></i>Back to Login
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
        const emailVal = /*[[${email}]]*/ '';
        const otpType  = 'LOGIN_2FA';
        let countdownTimer = null;

        // ── OTP boxes ──────────────────────────────────────────────────────
        const boxes = Array.from(document.querySelectorAll('.otp-box'));
        const verifyBtn = document.getElementById('verifyBtn');
        const otpHidden = document.getElementById('otpHidden');

        boxes.forEach((box, i) => {
            box.addEventListener('input', e => {
                box.value = box.value.replace(/\D/g, '').slice(-1);
                box.classList.toggle('filled', box.value !== '');
                if (box.value && i < boxes.length - 1) boxes[i + 1].focus();
                updateSubmit();
            });
            box.addEventListener('keydown', e => {
                if (e.key === 'Backspace' && !box.value && i > 0) boxes[i - 1].focus();
            });
            box.addEventListener('paste', e => {
                const pasted = (e.clipboardData || window.clipboardData).getData('text');
                const digits = pasted.replace(/\D/g, '').slice(0, 6);
                if (digits.length === 6) {
                    digits.split('').forEach((d, idx) => {
                        if (boxes[idx]) { boxes[idx].value = d; boxes[idx].classList.add('filled'); }
                    });
                    updateSubmit();
                    e.preventDefault();
                }
            });
        });

        function updateSubmit() {
            const combined = boxes.map(b => b.value).join('');
            otpHidden.value = combined;
            verifyBtn.disabled = combined.length !== 6;
        }

        // ── Countdown ──────────────────────────────────────────────────────
        function startCountdown(seconds) {
            const btn = document.getElementById('resendBtn');
            const wrap = document.getElementById('countdownWrap');
            btn.disabled = true;
            if (countdownTimer) clearInterval(countdownTimer);
            let remaining = seconds;
            wrap.textContent = `Resend available in ${remaining}s`;
            countdownTimer = setInterval(() => {
                remaining--;
                wrap.textContent = remaining > 0 ? `Resend available in ${remaining}s` : '';
                if (remaining <= 0) { clearInterval(countdownTimer); btn.disabled = false; }
            }, 1000);
        }

        function toast(msg, type = 'success') {
            const box = document.getElementById('toastBox');
            const el = document.createElement('div');
            el.className = `toast-msg toast-${type}`;
            el.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'} me-2"></i>${msg}`;
            box.appendChild(el);
            setTimeout(() => el.remove(), 3500);
        }

        async function resendOtp() {
            try {
                const res = await fetch('/customer/api/resend-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailVal, type: otpType })
                });
                const data = await res.json();
                if (res.ok && data.success) {
                    toast(data.message || 'OTP resent!', 'success');
                    startCountdown(60);
                    boxes.forEach(b => { b.value = ''; b.classList.remove('filled'); });
                    updateSubmit();
                } else {
                    toast(data.error || 'Could not resend OTP.', 'error');
                    if (data.cooldownRemaining > 0) startCountdown(data.cooldownRemaining);
                }
            } catch (e) {
                toast('Network error. Please try again.', 'error');
            }
        }

        // Focus first box and start countdown
        document.getElementById('d0').focus();
        startCountdown(60);
    </script>
</body>
</html>
