<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Accounts | Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link th:href="@{/css/headerbar.css}" rel="stylesheet" />
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    .container-custom {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 1rem 3rem;
    }

    .page-card {
      background: white;
      border-radius: 18px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.15);
      overflow: hidden;
    }

    .page-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 1.8rem 2rem;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .page-header h4 {
      font-weight: 700;
      margin: 0;
      font-size: 1.25rem;
    }

    .page-info {
      font-size: 0.85rem;
      opacity: 0.85;
    }

    .back-btn {
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.35);
      color: white;
      border-radius: 8px;
      padding: 0.4rem 0.9rem;
      font-size: 0.85rem;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: background 0.2s;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.28);
      color: white;
    }

    .filter-pills {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-pill {
      padding: 0.3rem 0.85rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      text-decoration: none;
      border: 1.5px solid rgba(255, 255, 255, 0.5);
      color: white;
      transition: background 0.2s;
      cursor: pointer;
    }

    .filter-pill:hover,
    .filter-pill.active {
      background: rgba(255, 255, 255, 0.25);
      color: white;
    }

    .table th {
      background: #f8fafc;
      color: #475569;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 2px solid #e2e8f0;
    }

    .table td {
      vertical-align: middle;
      color: #334155;
      font-size: 0.875rem;
      border-color: #f1f5f9;
    }

    .table tbody tr:hover {
      background: #f8fafc;
    }

    .badge-savings {
      background: #dcfce7;
      color: #16a34a;
      font-weight: 700;
      border-radius: 8px;
      padding: 0.3em 0.75em;
      font-size: 0.82rem;
    }

    .badge-current {
      background: #dbeafe;
      color: #1d4ed8;
      font-weight: 700;
      border-radius: 8px;
      padding: 0.3em 0.75em;
      font-size: 0.82rem;
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: #94a3b8;
    }

    .owner-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 0.78rem;
      font-weight: 700;
      margin-right: 0.5rem;
    }

    .pagination-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.5rem;
      border-top: 1px solid #f1f5f9;
    }

    .page-count {
      font-size: 0.82rem;
      color: #94a3b8;
    }

    .loading-row td {
      text-align: center;
      color: #94a3b8;
      padding: 2.5rem !important;
    }
  </style>
</head>

<body class="has-fixed-header">
  <div th:replace="~{headerbar-admin :: header}"></div>

  <div class="container-custom">
    <!-- Back -->
    <div class="mb-3">
      <a th:href="@{/admin/dashboard-admin}" class="back-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
    </div>

    <div class="page-card">
      <!-- Header -->
      <div class="page-header">
        <div>
          <h4>
            <i class="fas fa-wallet me-2"></i>
            <span id="pageTitle">All Accounts</span>
          </h4>
          <div class="page-info" id="pageCountHeader">
            Loading accounts...
          </div>
        </div>
        <div class="filter-pills" id="tabFilterGrid">
          <button class="filter-pill active" onclick="setDashboardTab('ALL', this)">
            All
          </button>
          <button class="filter-pill" onclick="setDashboardTab('SAVINGS', this)">
            Savings
          </button>
          <button class="filter-pill" onclick="setDashboardTab('CURRENT', this)">
            Current
          </button>
        </div>
      </div>

      <!-- Table -->
      <div class="table-responsive">
        <table class="table mb-0" id="accTable">
          <thead>
            <tr>
              <th class="ps-3">#</th>
              <th>Account Number</th>
              <th>Type</th>
              <th>Balance</th>
              <th>Branch</th>
              <th>IFSC</th>
              <th>Owner</th>
              <th class="pe-3">Action</th>
            </tr>
          </thead>
          <tbody id="accBody">
            <tr class="loading-row">
              <td colspan="8">
                <i class="fas fa-spinner fa-spin me-2"></i>Loading accounts...
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination info -->
      <div class="pagination-bar">
        <div class="page-count" id="tablePageCount">0 total account(s)</div>
        <div class="d-flex align-items-center gap-2">
          <span id="refreshIndicator" style="font-size: 0.75rem; color: #94a3b8; margin-right: 8px"></span>
          <input type="text" id="searchAcc" placeholder="Search by account # or owner…" style="
                border: 1.5px solid #e2e8f0;
                border-radius: 10px;
                padding: 0.3rem 0.75rem;
                font-size: 0.85rem;
                outline: none;
              " oninput="applyFilters()" />
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script th:inline="javascript">
    // Grab the initial filterType injected from the server (e.g., 'SAVINGS' or null)
    let initialFilter = /*[[${filterType}]]*/ null;

    let allAccounts = [];
    let filteredAccounts = [];
    let currentTab = initialFilter || "ALL";

    function setDashboardTab(tab, btnElement) {
      currentTab = tab;
      // Update UI title
      document.getElementById("pageTitle").textContent =
        tab === "ALL" ? "All Accounts" : tab + " Accounts";

      // update active class
      document
        .querySelectorAll(".filter-pill")
        .forEach((btn) => btn.classList.remove("active"));
      if (btnElement) {
        btnElement.classList.add("active");
      } else {
        // Find matching button if triggered programmatically
        document.querySelectorAll(".filter-pill").forEach((btn) => {
          if (btn.textContent.toUpperCase() === tab)
            btn.classList.add("active");
        });
      }

      applyFilters();
    }

    async function fetchAccounts() {
      try {
        const res = await fetch("/admin/api/accounts");
        if (!res.ok) throw new Error("Network error");
        allAccounts = await res.json();

        // Update timestamp
        const now = new Date().toLocaleTimeString("en-IN", {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: true,
        });
        document.getElementById("refreshIndicator").textContent =
          "Updated " + now;

        applyFilters();
      } catch (err) {
        console.error(err);
        if (allAccounts.length === 0) {
          document.getElementById("accBody").innerHTML =
            '<tr class="loading-row"><td colspan="8"><i class="fas fa-exclamation-triangle text-danger me-2"></i>Error loading accounts</td></tr>';
        }
      }
    }

    function applyFilters() {
      const q = document
        .getElementById("searchAcc")
        .value.toLowerCase()
        .trim();

      // 1. Filter by Tab
      filteredAccounts =
        currentTab === "ALL"
          ? allAccounts
          : allAccounts.filter(
            (a) => (a.accountType || "").toUpperCase() === currentTab,
          );

      // 2. Filter by Search Query
      if (q) {
        filteredAccounts = filteredAccounts.filter((a) => {
          const fname = a.customer?.fname || "";
          const lname = a.customer?.lname || "";
          const accNo = a.accountNumber || "";
          return (
            fname.toLowerCase().includes(q) ||
            lname.toLowerCase().includes(q) ||
            String(accNo).includes(q)
          );
        });
      }

      renderTable();
    }

    function renderTable() {
      const tbody = document.getElementById("accBody");

      // Overwrite counters
      document.getElementById("pageCountHeader").textContent =
        `${filteredAccounts.length} account(s)`;
      document.getElementById("tablePageCount").textContent =
        `${filteredAccounts.length} total account(s)`;

      if (filteredAccounts.length === 0) {
        tbody.innerHTML =
          '<tr><td colspan="8" class="empty-state"><i class="fas fa-inbox fa-2x mb-2 d-block"></i>No accounts found.</td></tr>';
        return;
      }

      tbody.innerHTML = filteredAccounts
        .map((acc, index) => {
          const isSavings =
            (acc.accountType || "").toUpperCase() === "SAVINGS";
          const isCurrent =
            (acc.accountType || "").toUpperCase() === "CURRENT";
          const typeBadge = isSavings
            ? '<span class="badge-savings">SAVINGS</span>'
            : isCurrent
              ? '<span class="badge-current">CURRENT</span>'
              : '<span class="text-muted">—</span>';

          const bal = parseFloat(acc.balance || 0).toFixed(2);

          let ownerCell = '<span class="text-muted">—</span>';
          let actionCell = "";
          if (acc.customer) {
            const initials = (
              (acc.customer.fname || "?")[0] + (acc.customer.lname || "?")[0]
            ).toUpperCase();
            ownerCell = `<span><span class="owner-avatar">${initials}</span><span>${acc.customer.fname || ""} ${acc.customer.lname || ""}</span></span>`;
            actionCell = `<a href="/admin/customer-account/${acc.customer.id}" class="btn btn-sm btn-outline-primary" style="border-radius:8px;font-size:.78rem;"><i class="fas fa-eye"></i> View</a>`;
          }

          return `<tr>
                    <td class="ps-3 text-muted" style="font-size:.8rem;">${index + 1}</td>
                    <td><strong>${acc.accountNumber || "—"}</strong> ${acc.locked ? '<span class="badge bg-danger ms-1" style="font-size:0.7rem" title="Account Locked"><i class="fas fa-lock text-white"></i> Locked</span>' : ''}</td>
                    <td>${typeBadge}</td>
                    <td class="fw-semibold text-success">₹<span>${bal}</span></td>
                    <td>${acc.branch || "—"}</td>
                    <td><small>${acc.ifsc || "—"}</small></td>
                    <td>${ownerCell}</td>
                    <td class="pe-3">${actionCell}</td>
                </tr>`;
        })
        .join("");
    }

    // Init
    if (initialFilter) {
      setDashboardTab(initialFilter, null);
    } else {
      setDashboardTab("ALL", null);
    }

    fetchAccounts();
    setInterval(fetchAccounts, 10000); // 10s polling
  </script>
</body>

</html>
