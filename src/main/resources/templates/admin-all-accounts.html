<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Accounts | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link th:href="@{/css/headerbar.css}" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg,#667eea 0%,#764ba2 100%); min-height:100vh; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }
        .container-custom { max-width:1200px; margin:2rem auto; padding:0 1rem 3rem; }
        .page-card { background:white; border-radius:18px; box-shadow:0 12px 32px rgba(0,0,0,.15); overflow:hidden; }
        .page-header { background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); padding:1.8rem 2rem; color:white; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem; }
        .page-header h4 { font-weight:700; margin:0; font-size:1.25rem; }
        .page-info { font-size:.85rem; opacity:.85; }
        .back-btn { background:rgba(255,255,255,.18); border:1px solid rgba(255,255,255,.35); color:white; border-radius:8px; padding:.4rem .9rem; font-size:.85rem; text-decoration:none; display:inline-flex; align-items:center; gap:.4rem; transition:background .2s; }
        .back-btn:hover { background:rgba(255,255,255,.28); color:white; }
        .filter-pills { display:flex; gap:.5rem; flex-wrap:wrap; align-items:center; }
        .filter-pill { padding:.3rem .85rem; border-radius:20px; font-size:.8rem; font-weight:600; text-decoration:none; border:1.5px solid rgba(255,255,255,.5); color:white; transition:background .2s; }
        .filter-pill:hover,.filter-pill.active { background:rgba(255,255,255,.25); color:white; }
        .table th { background:#f8fafc; color:#475569; font-size:.78rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; border-bottom:2px solid #e2e8f0; }
        .table td { vertical-align:middle; color:#334155; font-size:.875rem; border-color:#f1f5f9; }
        .table tbody tr:hover { background:#f8fafc; }
        .badge-savings { background:#dcfce7; color:#16a34a; font-weight:700; border-radius:8px; padding:.3em .75em; font-size:.82rem; }
        .badge-current { background:#dbeafe; color:#1d4ed8; font-weight:700; border-radius:8px; padding:.3em .75em; font-size:.82rem; }
        .empty-state { text-align:center; padding:3rem 1rem; color:#94a3b8; }
        .owner-avatar { width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:inline-flex;align-items:center;justify-content:center;color:white;font-size:.78rem;font-weight:700;margin-right:.5rem; }
        .pagination-bar { display:flex; align-items:center; justify-content:space-between; padding:.9rem 1.5rem; border-top:1px solid #f1f5f9; }
        .page-count { font-size:.82rem; color:#94a3b8; }
    </style>
</head>
<body class="has-fixed-header">
    <div th:replace="~{headerbar-admin :: header}"></div>

    <div class="container-custom">
        <!-- Back -->
        <div class="mb-3">
            <a th:href="@{/admin/dashboard-admin}" class="back-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
        </div>

        <div class="page-card">
            <!-- Header -->
            <div class="page-header">
                <div>
                    <h4>
                        <i class="fas fa-wallet me-2"></i>
                        <span th:text="${filterType != null} ? (filterType + ' Accounts') : 'All Accounts'">All Accounts</span>
                    </h4>
                    <div class="page-info" th:text="${accounts.size()} + ' account(s)'">0 accounts</div>
                </div>
                <div class="filter-pills">
                    <a th:href="@{/admin/all-accounts}" class="filter-pill" th:classappend="${filterType == null} ? 'active' : ''">All</a>
                    <a th:href="@{/admin/all-accounts(type='SAVINGS')}" class="filter-pill" th:classappend="${filterType == 'SAVINGS'} ? 'active' : ''">Savings</a>
                    <a th:href="@{/admin/all-accounts(type='CURRENT')}" class="filter-pill" th:classappend="${filterType == 'CURRENT'} ? 'active' : ''">Current</a>
                </div>
            </div>

            <!-- Table -->
            <div class="table-responsive">
                <table class="table mb-0" id="accTable">
                    <thead>
                        <tr>
                            <th class="ps-3">#</th>
                            <th>Account Number</th>
                            <th>Type</th>
                            <th>Balance</th>
                            <th>Branch</th>
                            <th>IFSC</th>
                            <th>Owner</th>
                            <th class="pe-3">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${accounts.isEmpty()}">
                            <td colspan="8" class="empty-state"><i class="fas fa-inbox fa-2x mb-2 d-block"></i>No accounts found.</td>
                        </tr>
                        <tr th:each="acc, stat : ${accounts}">
                            <td class="ps-3 text-muted" style="font-size:.8rem;" th:text="${stat.count}">1</td>
                            <td><strong th:text="${acc.accountNumber}">—</strong></td>
                            <td>
                                <span th:if="${acc.accountType?.name() == 'SAVINGS'}" class="badge-savings">SAVINGS</span>
                                <span th:if="${acc.accountType?.name() == 'CURRENT'}" class="badge-current">CURRENT</span>
                                <span th:if="${acc.accountType == null}" class="text-muted">—</span>
                            </td>
                            <td class="fw-semibold text-success">₹<span th:text="${#numbers.formatDecimal(acc.balance, 1, 2)}">0.00</span></td>
                            <td th:text="${acc.branch ?: '—'}">—</td>
                            <td><small th:text="${acc.ifsc ?: '—'}">—</small></td>
                            <td>
                                <span th:if="${acc.customer != null}">
                                    <span class="owner-avatar" th:text="${#strings.substring(acc.customer.fname,0,1) + #strings.substring(acc.customer.lname,0,1)}">??</span>
                                    <span th:text="${acc.customer.fname + ' ' + acc.customer.lname}">Name</span>
                                </span>
                                <span th:if="${acc.customer == null}" class="text-muted">—</span>
                            </td>
                            <td class="pe-3">
                                <a th:if="${acc.customer != null}"
                                   th:href="@{'/admin/customer-account/' + ${acc.customer.id}}"
                                   class="btn btn-sm btn-outline-primary" style="border-radius:8px;font-size:.78rem;">
                                    <i class="fas fa-eye"></i> View
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination info -->
            <div class="pagination-bar">
                <div class="page-count" th:text="${accounts.size()} + ' total account(s)'"></div>
                <input type="text" id="searchAcc" placeholder="Search by account # or owner…"
                       style="border:1.5px solid #e2e8f0;border-radius:10px;padding:.3rem .75rem;font-size:.85rem;outline:none;"
                       oninput="filterTable(this.value)">
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function filterTable(q) {
            q = q.toLowerCase();
            document.querySelectorAll('#accTable tbody tr').forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(q) ? '' : 'none';
            });
        }
    </script>
</body>
</html>
