<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Register - Customer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <style>
        .card { max-width: 700px; margin: 40px auto; }
    </style>
</head>
<body>
<div class="card">
    <div class="card-body">
        <h4 class="card-title mb-4">Customer Registration</h4>

        <!-- show controller-provided errors and success message -->
        <div th:if="${#vars['email-error']}" class="alert alert-danger" th:text="${#vars['email-error']}"></div>
        <div th:if="${#vars['adhar-error']}" class="alert alert-danger" th:text="${#vars['adhar-error']}"></div>
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

        <form th:action="@{/auth/register-customer}" th:object="${customer}" method="post">
            <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="fname">First name</label>
                    <input type="text" th:field="*{fname}" class="form-control" id="fname" placeholder="First name" required>
                </div>
                <div class="form-group col-md-6">
                    <label for="lname">Last name</label>
                    <input type="text" th:field="*{lname}" class="form-control" id="lname" placeholder="Last name" required>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" th:field="*{email}" class="form-control" id="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" th:field="*{password}" class="form-control" id="password" placeholder="Password" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="text" th:field="*{phone}" class="form-control" id="phone" placeholder="Phone number">
            </div>

            <div class="form-group">
                <label for="address">Address</label>
                <input type="text" th:field="*{address}" class="form-control" id="address" placeholder="Street, City">
            </div>

            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="dob">Date of birth</label>
                    <input type="date" th:field="*{dob}" class="form-control" id="dob">
                </div>
                <div class="form-group col-md-6">
                    <label for="adharcard">Aadhar Card</label>
                    <input type="number" th:field="*{adharcard}" class="form-control" id="adharcard" placeholder="Aadhar number">
                </div>
            </div>

            <div class="form-group mt-4">
                <button type="submit" class="btn btn-primary">Register</button>
                <a th:href="@{/login-customer}" class="btn btn-link">Already have an account?</a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
