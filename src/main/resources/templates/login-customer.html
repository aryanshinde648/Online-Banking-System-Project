<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Customer Login | Online Banking System</title>
    <link th:href="@{/css/headerbar.css}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            border: none;
        }

        .login-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.25);
        }

        .card-title-login {
            color: #2c3e50;
            font-weight: 700;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .card-subtitle {
            color: #7f8c8d;
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .form-control,
        .form-control:focus {
            border-radius: 8px;
            border: 2px solid #e9ecef;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
            background-color: #f8f9ff;
        }

        .form-label {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .btn-login {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            padding: 0.85rem 2rem;
            font-weight: 600;
            color: white;
            transition: all 0.3s ease;
            width: 100%;
            font-size: 1rem;
        }

        .btn-login:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
            color: white;
        }

        .register-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .register-link:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .alert {
            border-radius: 8px;
            border: none;
            margin-bottom: 1.5rem;
        }

        .icon-login {
            color: #667eea;
            margin-right: 0.5rem;
        }

        /* Floating Toast Notification Styles */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1055;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .custom-toast {
            animation: slideInRight 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            min-width: 320px;
            border-left: 4px solid transparent;
            background-color: white;
            padding: 16px 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .custom-toast.error-toast {
            border-left-color: #dc3545;
            color: #dc3545;
        }

        .custom-toast.success-toast {
            border-left-color: #28a745;
            color: #28a745;
        }

        .custom-toast .message {
            flex: 1;
            color: #333;
            font-size: 0.95rem;
            font-weight: 500;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100%);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeOutRight {
            from {
                opacity: 1;
                transform: translateX(0);
            }

            to {
                opacity: 0;
                transform: translateX(100%);
            }
        }
    </style>
</head>

<body class="has-fixed-header">
    <div th:replace="~{headerbar-customer :: auth-nav}"></div>
    <script th:inline="javascript"></script>


    <div class="container" style="max-width: 450px; margin: 3rem auto;">
        <div class="card login-card">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="fas fa-sign-in-alt icon-login" style="font-size: 2.5rem;"></i>
                    <h2 class="card-title-login mt-3">Welcome Back</h2>
                    <p class="card-subtitle">Sign in to your account</p>
                </div>

                <!-- Toast Container -->
                <div class="toast-container">
                    <!-- Error Toast -->
                    <div th:if="${error}" class="custom-toast error-toast">
                        <i class="fas fa-exclamation-circle" style="font-size: 1.4rem;"></i>
                        <div class="message" th:text="${error}"></div>
                        <button type="button" class="btn-close"
                            style="background:none; border:none; color:#95a5a6; font-size:1.2rem; cursor:pointer;"
                            onclick="this.parentElement.remove()">&times;</button>
                    </div>

                    <!-- Success Toast -->
                    <div th:if="${success}" class="custom-toast success-toast">
                        <i class="fas fa-check-circle" style="font-size: 1.4rem;"></i>
                        <div class="message">
                            <span th:text="${success}"></span><br>
                            <small class="text-muted" style="font-weight: normal;">Redirecting...</small>
                        </div>
                        <button type="button" class="btn-close"
                            style="background:none; border:none; color:#95a5a6; font-size:1.2rem; cursor:pointer;"
                            onclick="this.parentElement.remove()">&times;</button>
                    </div>
                </div>

                <form th:action="@{/customer/login-customer}" method="post">
                    <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}"
                        th:value="${_csrf.token}" />

                    <div class="mb-4">
                        <label for="email" class="form-label">
                            <i class="fas fa-envelope icon-login"></i> Email Address
                        </label>
                        <input type="email" name="email" class="form-control" id="email" placeholder="Enter your email"
                            required>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock icon-login"></i> Password
                        </label>
                        <input type="password" name="password" class="form-control" id="password"
                            placeholder="Enter your password" required>
                    </div>

                    <button type="submit" class="btn btn-login mb-3">
                        <i class="fas fa-sign-in-alt"></i> Sign In
                    </button>

                    <div class="text-center">
                        <p class="text-muted" style="font-size: 0.9rem;">Don't have an account? <a
                                th:href="@{/customer/register-customer}" class="register-link">Create one here</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script th:if="${success}" th:inline="javascript">
        const redirectUrl = /*[[${redirectUrl}]]*/ '/customer/dashboard-customer';
        setTimeout(() => {
            window.location.href = redirectUrl;
        }, 1500);
    </script>

    <script>
        // Auto-dismiss toasts after 5 seconds
        document.addEventListener('DOMContentLoaded', () => {
            const toasts = document.querySelectorAll('.custom-toast');
            toasts.forEach(toast => {
                setTimeout(() => {
                    toast.style.animation = 'fadeOutRight 0.3s ease forwards';
                    setTimeout(() => toast.remove(), 300);
                }, 5000);
            });
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
