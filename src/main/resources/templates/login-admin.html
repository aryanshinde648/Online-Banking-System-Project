<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Admin Login | Online Banking System</title>
    <link th:href="@{/css/headerbar.css}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            border: none;
        }

        .login-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.25);
        }

        .card-title-login {
            color: #2c3e50;
            font-weight: 700;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .card-subtitle {
            color: #7f8c8d;
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .form-control,
        .form-control:focus {
            border-radius: 8px;
            border: 2px solid #e9ecef;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
            background-color: #f8f9ff;
        }

        .form-label {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .btn-login {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            padding: 0.85rem 2rem;
            font-weight: 600;
            color: white;
            transition: all 0.3s ease;
            width: 100%;
            font-size: 1rem;
        }

        .btn-login:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
            color: white;
        }

        .register-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .register-link:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .alert {
            border-radius: 8px;
            border: none;
            margin-bottom: 1.5rem;
        }

        .alert-danger {
            background-color: #f8d7da;
            color: #721c24;
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
        }

        .icon-login {
            color: #667eea;
            margin-right: 0.5rem;
        }
    </style>
</head>

<body class="has-fixed-header">
    <div th:replace="~{headerbar-admin :: auth-nav}"></div>
    <script th:inline="javascript"></script>


    <div class="container" style="max-width: 450px; margin: 3rem auto;">
        <div class="card login-card">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="fas fa-sign-in-alt icon-login" style="font-size: 2.5rem;"></i>
                    <h2 class="card-title-login mt-3">Welcome Back</h2>
                    <p class="card-subtitle">Sign in to your account</p>
                </div>

                <div th:if="${error}" class="alert alert-danger d-flex align-items-center" th:text="${error}">
                    <i class="fas fa-exclamation-circle mr-2"></i>
                </div>
                <div th:if="${success}" class="alert alert-success">
                    <i class="fas fa-check-circle mr-2"></i>
                    <span th:text="${success}"></span>
                    <br>
                    <small>Redirecting in <strong id="countdown">10</strong> seconds...</small>
                    <br>
                    <button type="button" id="redirectNowBtn" class="btn btn-sm btn-success mt-2"
                        style="background-color: #155724; border-color: #155724;">
                        <i class="fas fa-arrow-right"></i> Redirect Now
                    </button>
                </div>

                <form th:action="@{/admin/login-admin}" method="post">
                    <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}"
                        th:value="${_csrf.token}" />

                    <div class="mb-4">
                        <label for="email" class="form-label">
                            <i class="fas fa-envelope icon-login"></i> Email Address
                        </label>
                        <input type="email" name="email" class="form-control" id="email" placeholder="Enter your email"
                            required>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock icon-login"></i> Password
                        </label>
                        <input type="password" name="password" class="form-control" id="password"
                            placeholder="Enter your password" required>
                    </div>

                    <button type="submit" class="btn btn-login mb-3">
                        <i class="fas fa-sign-in-alt"></i> Sign In
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script th:if="${success}" th:inline="javascript">
        let remaining = /*[[${redirectDelayMs}]]*/ 10000 / 1000;
        const redirectUrl = /*[[${redirectUrl}]]*/ '/admin/dashboard-admin';
        const countdownEl = document.getElementById('countdown');
        const redirectBtn = document.getElementById('redirectNowBtn');

        countdownEl.textContent = remaining;

        // Handle redirect now button click
        if (redirectBtn) {
            redirectBtn.addEventListener('click', function () {
                clearInterval(timer);
                window.location.href = redirectUrl;
            });
        }

        const timer = setInterval(function () {
            remaining--;
            countdownEl.textContent = remaining;
            if (remaining <= 0) {
                clearInterval(timer);
                window.location.href = redirectUrl;
            }
        }, 1000);
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
