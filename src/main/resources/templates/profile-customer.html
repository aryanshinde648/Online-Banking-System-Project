<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Profile - Online Banking System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="/css/headerbar.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 0 15px 30px;
        }

        .profile-container {
            max-width: 700px;
            margin: 0 auto;
            padding-top: 1.5rem;
        }

        .profile-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.25);
        }

        .profile-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .profile-icon {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-right: 20px;
        }

        .profile-header-text h2 {
            margin: 0;
            font-size: 28px;
            font-weight: 600;
        }

        .profile-header-text p {
            margin: 5px 0 0 0;
            opacity: 0.9;
            font-size: 14px;
        }

        .profile-body {
            padding: 30px;
        }

        .profile-section {
            margin-bottom: 25px;
        }

        .profile-section-title {
            font-size: 14px;
            font-weight: 600;
            color: #667eea;
            text-transform: uppercase;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .profile-section-title i {
            color: #764ba2;
        }

        .profile-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .profile-row.full {
            grid-template-columns: 1fr;
        }

        .profile-field {
            display: flex;
            flex-direction: column;
        }

        .profile-field-label {
            font-size: 12px;
            font-weight: 600;
            color: #7f8c8d;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .profile-field-value {
            font-size: 16px;
            color: #2c3e50;
            font-weight: 500;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 3px solid #667eea;
        }

        .profile-field-input {
            font-size: 15px;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .profile-field-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .profile-field-input:disabled {
            background: #f8f9fa;
            cursor: not-allowed;
            color: #7f8c8d;
        }

        .read-only-fields {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .read-only-fields.full {
            grid-template-columns: 1fr;
        }

        .read-only-field {
            display: flex;
            flex-direction: column;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 30px;
            padding-top: 25px;
            border-top: 2px solid #f0f0f0;
        }

        .btn-action {
            flex: 1;
            padding: 12px 20px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-update {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-update:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .btn-save {
            background: #2ecc71;
            color: white;
        }

        .btn-save:hover:not(:disabled) {
            background: #27ae60;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(46, 204, 113, 0.3);
        }

        .btn-save:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .btn-cancel {
            background: #e74c3c;
            color: white;
        }

        .btn-cancel:hover {
            background: #c0392b;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(231, 76, 60, 0.3);
        }

        .btn-logout {
            background: #95a5a6;
            color: white;
            width: 100%;
            margin-top: 10px;
        }

        .btn-logout:hover {
            background: #7f8c8d;
            transform: translateY(-2px);
        }

        .alert-box {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #28a745;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 2px solid #bee5eb;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hidden {
            display: none !important;
        }

        .edit-mode .profile-field-value {
            display: none;
        }

        .view-mode .profile-field-input {
            display: none;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: white;
            text-decoration: none;
            margin-bottom: 20px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            transform: translateX(-5px);
            gap: 12px;
        }

        @media (max-width: 600px) {
            .profile-container {
                margin: 20px auto 0;
            }

            .profile-header {
                flex-direction: column;
                text-align: center;
                padding: 20px;
            }

            .profile-icon {
                margin-right: 0;
                margin-bottom: 15px;
            }

            .profile-row,
            .read-only-fields {
                grid-template-columns: 1fr;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn-action {
                width: 100%;
            }
        }

        .spinner-border-sm {
            width: 1rem;
            height: 1rem;
        }
    </style>
</head>

<body class="has-fixed-header">
    <!-- Header Bar Fragment -->
    <div th:replace="~{headerbar-customer :: header}"></div>

    <!-- Main Profile Container (back button lives here so it always scrolls with content) -->
    <div class="profile-container">
        <!-- Back Button -->
        <a href="/customer/dashboard-customer" class="back-button">
            <i class="fas fa-arrow-left"></i>
            <span>Back to Dashboard</span>
        </a>

        <!-- Alert Messages -->
        <div id="alertContainer"></div>

        <!-- Profile Card -->
        <div class="profile-card">
            <!-- Profile Header -->
            <div class="profile-header">
                <div style="display: flex; align-items: center;">
                    <div class="profile-icon">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <div class="profile-header-text">
                        <h2 id="headerName"
                            th:text="${loggedInCustomer != null ? loggedInCustomer.fname + ' ' + loggedInCustomer.lname : 'Customer Name'}">
                            Customer Name</h2>
                        <p id="headerEmail"
                            th:text="${loggedInCustomer != null ? loggedInCustomer.email : 'email@example.com'}">
                            email@example.com</p>
                    </div>
                </div>
            </div>

            <!-- Profile Body -->
            <div class="profile-body">
                <!-- Profile Form -->
                <form id="profileForm">
                    <!-- Hidden customer id (from model) -->
                    <input type="hidden" id="customerIdHidden" th:value="${loggedInCustomer?.customerId}" />
                    <!-- Personal Information Section -->
                    <div class="profile-section view-mode" id="personalSection">
                        <div class="profile-section-title">
                            <i class="fas fa-id-card"></i>
                            Personal Information
                        </div>

                        <!-- First Name and Last Name -->
                        <div class="profile-row">
                            <div class="profile-field">
                                <div class="profile-field-label">
                                    <i class="fas fa-user"></i> First Name
                                </div>
                                <div class="profile-field-value" id="fnameDisplay" th:text="${loggedInCustomer?.fname}">
                                    John
                                </div>
                                <input type="text" class="profile-field-input" id="fname"
                                    th:value="${loggedInCustomer?.fname}" placeholder="First Name" disabled>
                            </div>

                            <div class="profile-field">
                                <div class="profile-field-label">
                                    <i class="fas fa-user"></i> Last Name
                                </div>
                                <div class="profile-field-value" id="lnameDisplay" th:text="${loggedInCustomer?.lname}">
                                    Doe
                                </div>
                                <input type="text" class="profile-field-input" id="lname"
                                    th:value="${loggedInCustomer?.lname}" placeholder="Last Name" disabled>
                            </div>
                        </div>

                        <!-- Email -->
                        <div class="profile-row full">
                            <div class="profile-field">
                                <div class="profile-field-label">
                                    <i class="fas fa-envelope"></i> Email Address
                                </div>
                                <div class="profile-field-value" id="emailDisplay" th:text="${loggedInCustomer?.email}">
                                    john@example.com
                                </div>
                                <input type="email" class="profile-field-input" id="email"
                                    th:value="${loggedInCustomer?.email}" placeholder="Email Address" disabled>
                            </div>
                        </div>

                        <!-- Phone Number -->
                        <div class="profile-row full">
                            <div class="profile-field">
                                <div class="profile-field-label">
                                    <i class="fas fa-phone"></i> Phone Number
                                </div>
                                <div class="profile-field-value" id="phoneDisplay" th:text="${loggedInCustomer?.phone}">
                                    +1 234 567 8900
                                </div>
                                <input type="tel" class="profile-field-input" id="phone"
                                    th:value="${loggedInCustomer?.phone}" placeholder="Phone Number" disabled>
                            </div>
                        </div>
                    </div>

                    <!-- Read-Only Information Section -->
                    <div class="profile-section"
                        style="margin-top: 30px; padding-top: 25px; border-top: 2px solid #f0f0f0;">
                        <div class="profile-section-title">
                            <i class="fas fa-lock"></i> Read-Only Information
                        </div>

                        <div class="read-only-fields">
                            <div class="read-only-field">
                                <div class="profile-field-label">
                                    <i class="fas fa-calendar"></i> Date of Birth
                                </div>
                                <div class="profile-field-value" th:text="${loggedInCustomer?.dob}">
                                    01/01/1990
                                </div>
                            </div>

                            <div class="read-only-field">
                                <div class="profile-field-label">
                                    <i class="fas fa-home"></i> Address
                                </div>
                                <div class="profile-field-value" th:text="${loggedInCustomer?.address}">
                                    123 Main St, City, State
                                </div>
                            </div>

                            <div class="read-only-field">
                                <div class="profile-field-label">
                                    <i class="fas fa-id-badge"></i> Aadhar Number
                                </div>
                                <div class="profile-field-value" th:text="${loggedInCustomer?.adharcard}">
                                    1234 5678 9012
                                </div>
                            </div>

                            <div class="read-only-field">
                                <div class="profile-field-label">
                                    <i class="fas fa-user-tag"></i> Customer ID
                                </div>
                                <div class="profile-field-value" th:text="${loggedInCustomer?.customerId}">
                                    CUST001
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="action-buttons" id="actionButtons">
                        <button type="button" class="btn-action btn-update" id="updateBtn" onclick="enableEditMode()">
                            <i class="fas fa-edit"></i> Update Profile
                        </button>
                    </div>

                    <!-- Edit Mode Buttons (Hidden by default) -->
                    <div class="action-buttons hidden" id="editActionButtons">
                        <button type="button" class="btn-action btn-save" id="saveBtn" onclick="saveProfile()">
                            <i class="fas fa-save"></i> Save Changes
                        </button>
                        <button type="button" class="btn-action btn-cancel" onclick="cancelEdit()">
                            <i class="fas fa-times"></i> Cancel
                        </button>
                    </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script>
        // Read customer ID from hidden input and validate
        let rawCustomerId = document.getElementById('customerIdHidden') ? document.getElementById('customerIdHidden').value : null;
        let customerId = null;
        if (rawCustomerId && rawCustomerId !== 'null') {
            const parsed = Number(rawCustomerId);
            customerId = !isNaN(parsed) ? parsed : null;
        }

        // Enable Edit Mode
        function enableEditMode() {
            const personalSection = document.getElementById('personalSection');
            const updateBtn = document.getElementById('updateBtn');
            const editActionButtons = document.getElementById('editActionButtons');

            personalSection.classList.add('edit-mode');
            personalSection.classList.remove('view-mode');

            // Enable input fields
            document.getElementById('fname').disabled = false;
            document.getElementById('lname').disabled = false;
            document.getElementById('email').disabled = false;
            document.getElementById('phone').disabled = false;

            // Hide update button, show edit buttons
            updateBtn.parentElement.classList.add('hidden');
            editActionButtons.classList.remove('hidden');

            // Focus on first input
            document.getElementById('fname').focus();
        }

        // Cancel Edit Mode
        function cancelEdit() {
            const personalSection = document.getElementById('personalSection');
            const updateBtn = document.getElementById('updateBtn');
            const editActionButtons = document.getElementById('editActionButtons');

            personalSection.classList.remove('edit-mode');
            personalSection.classList.add('view-mode');

            // Disable input fields
            document.getElementById('fname').disabled = true;
            document.getElementById('lname').disabled = true;
            document.getElementById('email').disabled = true;
            document.getElementById('phone').disabled = true;

            // Reset form values
            document.getElementById('fname').value = document.getElementById('fnameDisplay').textContent;
            document.getElementById('lname').value = document.getElementById('lnameDisplay').textContent;
            document.getElementById('email').value = document.getElementById('emailDisplay').textContent;
            document.getElementById('phone').value = document.getElementById('phoneDisplay').textContent;

            // Show update button, hide edit buttons
            updateBtn.parentElement.classList.remove('hidden');
            editActionButtons.classList.add('hidden');

            clearAlerts();
        }

        // Save Profile
        async function saveProfile() {
            const fname = document.getElementById('fname').value.trim();
            const lname = document.getElementById('lname').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();

            // Validation
            if (!fname || !lname || !email || !phone) {
                showAlert('Please fill in all fields', 'error');
                return;
            }

            // Validate email format
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showAlert('Please enter a valid email address', 'error');
                return;
            }

            // Validate phone number (at least 10 digits)
            const phoneRegex = /^[0-9]{10,}$/;
            if (!phoneRegex.test(phone.replace(/\D/g, ''))) {
                showAlert('Please enter a valid phone number (at least 10 digits)', 'error');
                return;
            }

            // Disable save button during submission
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Saving...';

            try {
                if (!customerId) {
                    showAlert('Unable to determine customer id. Please refresh and try again.', 'error');
                    return;
                }
                const response = await fetch(`/customer/profile/${customerId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        customerId: customerId,
                        fname: fname,
                        lname: lname,
                        email: email,
                        phone: phone
                    })
                });

                if (response.ok) {
                    const updatedCustomer = await response.json();

                    // Update display values
                    document.getElementById('fnameDisplay').textContent = fname;
                    document.getElementById('lnameDisplay').textContent = lname;
                    document.getElementById('emailDisplay').textContent = email;
                    document.getElementById('phoneDisplay').textContent = phone;
                    document.getElementById('headerName').textContent = fname + ' ' + lname;
                    document.getElementById('headerEmail').textContent = email;

                    showAlert('Profile updated successfully!', 'success');

                    // Exit edit mode
                    setTimeout(() => {
                        cancelEdit();
                    }, 1500);
                } else {
                    const errorData = await response.json();
                    showAlert(errorData.message || 'Error updating profile', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('An error occurred while updating your profile. Please try again.', 'error');
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = '<i class="fas fa-save"></i> Save Changes';
            }
        }

        // Show Alert
        function showAlert(message, type) {
            clearAlerts();
            const alertContainer = document.getElementById('alertContainer');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert-box alert-${type}`;
            alertDiv.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i>
                <span>${message}</span>
            `;
            alertContainer.appendChild(alertDiv);

            if (type === 'success') {
                setTimeout(() => alertDiv.remove(), 3000);
            }
        }

        // Clear All Alerts
        function clearAlerts() {
            document.getElementById('alertContainer').innerHTML = '';
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', function (event) {
            if (event.ctrlKey && event.key === 's') {
                event.preventDefault();
                if (!document.getElementById('editActionButtons').classList.contains('hidden')) {
                    saveProfile();
                }
            }
            if (event.key === 'Escape') {
                if (!document.getElementById('editActionButtons').classList.contains('hidden')) {
                    cancelEdit();
                }
            }
        });
    </script>
</body>

</html>
