<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Profile | Online Banking System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link th:href="@{/css/headerbar.css}" rel="stylesheet" />
    <style>
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      .container-custom {
        max-width: 700px;
        margin: 2rem auto;
        padding: 0 1rem 3rem;
      }

      .profile-card {
        background: white;
        border-radius: 18px;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.15);
        overflow: hidden;
      }

      .profile-header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 2.5rem 2rem 3.5rem;
        text-align: center;
        color: white;
        position: relative;
      }

      .avatar-large {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.25);
        border: 4px solid rgba(255, 255, 255, 0.6);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 2.2rem;
        font-weight: 700;
        margin-bottom: 1rem;
        color: white;
      }

      .profile-name {
        font-size: 1.5rem;
        font-weight: 700;
        margin: 0 0 0.25rem;
      }

      .profile-email {
        opacity: 0.85;
        font-size: 0.9rem;
        margin: 0;
      }

      .role-badge {
        display: inline-block;
        margin-top: 0.75rem;
        padding: 0.3em 1em;
        border-radius: 999px;
        font-size: 0.8rem;
        font-weight: 700;
        background: rgba(255, 255, 255, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.4);
        color: white;
      }

      .profile-body {
        padding: 2rem;
      }

      .info-row {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 0.85rem 0;
        border-bottom: 1px solid #f1f5f9;
      }

      .info-row:last-child {
        border-bottom: none;
      }

      .info-icon {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        background: rgba(102, 126, 234, 0.1);
        color: #667eea;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.95rem;
        flex-shrink: 0;
      }

      .info-label {
        font-size: 0.75rem;
        color: #94a3b8;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 0.1rem;
      }

      .info-value {
        font-size: 0.95rem;
        color: #1e293b;
        font-weight: 500;
      }

      .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        color: white;
        text-decoration: none;
        font-size: 0.9rem;
        margin-bottom: 1rem;
        opacity: 0.85;
        transition: opacity 0.2s;
      }

      .back-btn:hover {
        opacity: 1;
        color: white;
      }
    </style>
  </head>

  <body class="has-fixed-header">
    <div th:replace="~{headerbar-admin :: header}"></div>

    <div class="container-custom">
      <!-- Back link -->
      <a class="back-btn" th:href="@{/admin/dashboard-admin}">
        <i class="fas fa-arrow-left"></i> Back to Dashboard
      </a>

      <div class="profile-card">
        <!-- Header -->
        <div class="profile-header">
          <div class="avatar-large">
            <span
              th:text="${admin.fname != null ? #strings.toUpperCase(#strings.substring(admin.fname, 0, 1)) + (admin.lname != null ? #strings.toUpperCase(#strings.substring(admin.lname, 0, 1)) : '') : 'A'}"
              >AD</span
            >
          </div>
          <div
            class="profile-name"
            th:text="${admin.fname} + ' ' + (${admin.lname} ?: '')"
          >
            Admin Name
          </div>
          <div class="profile-email" th:text="${admin.email}">
            admin@example.com
          </div>
          <div class="role-badge">
            <i class="fas fa-shield-alt me-1"></i>
            <span th:text="${admin.adminRole}">MANAGER</span>
          </div>
        </div>

        <!-- Details -->
        <div class="profile-body">
          <div class="info-row">
            <div class="info-icon"><i class="fas fa-id-card"></i></div>
            <div>
              <div class="info-label">Admin ID</div>
              <div class="info-value" th:text="${admin.adminId} ?: '—'">—</div>
            </div>
          </div>

          <div class="info-row">
            <div class="info-icon"><i class="fas fa-phone"></i></div>
            <div>
              <div class="info-label">Phone</div>
              <div class="info-value" th:text="${admin.phone} ?: '—'">—</div>
            </div>
          </div>

          <div class="info-row">
            <div class="info-icon"><i class="fas fa-map-marker-alt"></i></div>
            <div>
              <div class="info-label">Address</div>
              <div class="info-value" th:text="${admin.address} ?: '—'">—</div>
            </div>
          </div>

          <div class="info-row">
            <div class="info-icon"><i class="fas fa-calendar-alt"></i></div>
            <div>
              <div class="info-label">Date of Birth</div>
              <div class="info-value" th:text="${admin.dob} ?: '—'">—</div>
            </div>
          </div>

          <div class="info-row">
            <div class="info-icon"><i class="fas fa-fingerprint"></i></div>
            <div>
              <div class="info-label">Aadhaar Card</div>
              <div class="info-value" th:text="${admin.adharcard} ?: '—'">
                —
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
