<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Profile | Online Banking System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link th:href="@{/css/headerbar.css}" rel="stylesheet" />
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    .container-custom {
      max-width: 700px;
      margin: 2rem auto;
      padding: 0 1rem 3rem;
    }

    .profile-card {
      background: white;
      border-radius: 18px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.15);
      overflow: hidden;
    }

    .profile-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 2.5rem 2rem 3.5rem;
      text-align: center;
      color: white;
      position: relative;
    }

    .avatar-large {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.25);
      border: 4px solid rgba(255, 255, 255, 0.6);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: white;
    }

    .profile-name {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0 0 0.25rem;
    }

    .profile-email {
      opacity: 0.85;
      font-size: 0.9rem;
      margin: 0;
    }

    .role-badge {
      display: inline-block;
      margin-top: 0.75rem;
      padding: 0.3em 1em;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.4);
      color: white;
    }

    .profile-body {
      padding: 2rem;
    }

    .info-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.85rem 0;
      border-bottom: 1px solid #f1f5f9;
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: rgba(102, 126, 234, 0.1);
      color: #667eea;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.95rem;
      flex-shrink: 0;
    }

    .info-label {
      font-size: 0.75rem;
      color: #94a3b8;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.1rem;
    }

    .info-value {
      font-size: 0.95rem;
      color: #1e293b;
      font-weight: 500;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: white;
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 1rem;
      opacity: 0.85;
      transition: opacity 0.2s;
    }

    .back-btn:hover {
      opacity: 1;
      color: white;
    }
  </style>
</head>

<body class="has-fixed-header">
  <div th:replace="~{headerbar-admin :: header}"></div>

  <div class="container-custom">
    <!-- Nav -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <a class="back-btn mb-0" th:href="@{/admin/dashboard-admin}">
        <i class="fas fa-arrow-left"></i> Back to Dashboard
      </a>
      <button th:if="${isOwnProfile == null or isOwnProfile}" class="btn btn-sm" style="
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 8px;
            font-weight: 600;
          " onclick="openEditProfile()">
        <i class="fas fa-edit me-1"></i> Edit Profile
      </button>
    </div>

    <!-- Toast Container -->
    <div class="toast-container">
      <!-- Error Toast -->
      <div th:if="${errorMessage}" class="custom-toast error-toast">
        <i class="fas fa-exclamation-circle" style="font-size: 1.4rem;"></i>
        <div class="message" th:text="${errorMessage}"></div>
        <button type="button" class="btn-close"
          style="background:none; border:none; color:#95a5a6; font-size:1.2rem; cursor:pointer;"
          onclick="this.parentElement.remove()">&times;</button>
      </div>

      <!-- Success Toast -->
      <div th:if="${successMessage}" class="custom-toast success-toast">
        <i class="fas fa-check-circle" style="font-size: 1.4rem;"></i>
        <div class="message" th:text="${successMessage}"></div>
        <button type="button" class="btn-close"
          style="background:none; border:none; color:#95a5a6; font-size:1.2rem; cursor:pointer;"
          onclick="this.parentElement.remove()">&times;</button>
      </div>
    </div>

    <div class="profile-card">
      <!-- Header -->
      <div class="profile-header">
        <div class="avatar-large">
          <span
            th:text="${admin.fname != null ? #strings.toUpperCase(#strings.substring(admin.fname, 0, 1)) + (admin.lname != null ? #strings.toUpperCase(#strings.substring(admin.lname, 0, 1)) : '') : 'A'}">AD</span>
        </div>
        <div class="profile-name" th:text="${admin.fname} + ' ' + (${admin.lname} ?: '')">
          Admin Name
        </div>
        <div class="profile-email" th:text="${admin.email}">
          admin@example.com
        </div>
        <div class="role-badge">
          <i class="fas fa-shield-alt me-1"></i>
          <span th:text="${admin.adminRole}">MANAGER</span>
        </div>
      </div>

      <!-- Details -->
      <div class="profile-body">
        <div class="info-row">
          <div class="info-icon"><i class="fas fa-id-card"></i></div>
          <div>
            <div class="info-label">Admin ID</div>
            <div class="info-value" th:text="${admin.adminId} ?: '—'">—</div>
          </div>
        </div>

        <div class="info-row">
          <div class="info-icon"><i class="fas fa-phone"></i></div>
          <div>
            <div class="info-label">Phone</div>
            <div class="info-value" th:text="${admin.phone} ?: '—'">—</div>
          </div>
        </div>

        <div class="info-row">
          <div class="info-icon"><i class="fas fa-map-marker-alt"></i></div>
          <div>
            <div class="info-label">Address</div>
            <div class="info-value" th:text="${admin.address} ?: '—'">—</div>
          </div>
        </div>

        <div class="info-row">
          <div class="info-icon"><i class="fas fa-calendar-alt"></i></div>
          <div>
            <div class="info-label">Date of Birth</div>
            <div class="info-value" th:text="${admin.dob} ?: '—'">—</div>
          </div>
        </div>

        <div class="info-row">
          <div class="info-icon"><i class="fas fa-fingerprint"></i></div>
          <div>
            <div class="info-label">Aadhaar Card</div>
            <div class="info-value" th:text="${admin.adharcard} ?: '—'">
              —
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Profile Modal -->
  <div class="modal fade" id="editProfileModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 rounded-4 overflow-hidden">
        <div class="modal-header" style="
              background: linear-gradient(135deg, #667eea, #764ba2);
              color: white;
            ">
          <h5 class="modal-title">
            <i class="fas fa-user-edit me-2"></i>Edit Profile
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" style="filter: invert(1)"></button>
        </div>
        <form th:action="@{/admin/update-profile}" method="post">
          <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <div class="modal-body p-4">
            <div class="row g-3">
              <div class="col-6">
                <label class="form-label fw-semibold">First Name</label>
                <input type="text" name="fname" id="editFname" class="form-control" th:value="${admin.fname}" />
              </div>
              <div class="col-6">
                <label class="form-label fw-semibold">Last Name</label>
                <input type="text" name="lname" id="editLname" class="form-control" th:value="${admin.lname}" />
              </div>
              <div class="col-12">
                <label class="form-label fw-semibold">Email</label>
                <input type="email" name="email" id="editEmail" class="form-control" th:value="${admin.email}" />
              </div>
              <div class="col-12">
                <label class="form-label fw-semibold">Phone</label>
                <input type="text" name="phone" id="editPhone" class="form-control" th:value="${admin.phone}" />
              </div>
              <div class="col-12">
                <label class="form-label fw-semibold">Address</label>
                <input type="text" name="address" id="editAddress" class="form-control" th:value="${admin.address}" />
              </div>
              <div class="col-12">
                <label class="form-label fw-semibold">New Password
                  <small class="text-muted">(leave blank to keep current)</small></label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" />
              </div>
            </div>
          </div>
          <div class="modal-footer border-0 pt-0">
            <button type="button" class="btn btn-light" data-bs-dismiss="modal">
              Cancel
            </button>
            <button type="submit" class="btn btn-primary px-4" style="background: #667eea; border: none">
              <i class="fas fa-save me-1"></i>Save Changes
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function openEditProfile() {
      new bootstrap.Modal(document.getElementById("editProfileModal")).show();
    }

    // Auto-dismiss toasts after 5 seconds
    document.addEventListener('DOMContentLoaded', () => {
      const toasts = document.querySelectorAll('.custom-toast');
      toasts.forEach(toast => {
        setTimeout(() => {
          toast.style.animation = 'fadeOutRight 0.3s ease forwards';
          setTimeout(() => toast.remove(), 300);
        }, 5000);
      });
    });
  </script>
</body>

</html>
