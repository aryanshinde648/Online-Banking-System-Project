spring:
  application:
    name: Online-Banking-System

  datasource:
    url: jdbc:mysql://localhost:3306/online_banking_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: admin
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        '[format_sql]': false
        dialect: org.hibernate.dialect.MySQLDialect 

server:
  port: 3030
