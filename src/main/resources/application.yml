spring:
  application:
    name: Online-Banking-System

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: true
    open-in-view: false

  # ── SendGrid API ────────────────────────────────────────────────────────────
  sendgrid:
    api-key: ${SENDGRID_API_KEY}
    from-email: ${MAIL_USERNAME:no-reply@sendgrid-verified-domain.com}

server:
  port: 3030

# ── OTP Settings ──────────────────────────────────────────────────────────────
app:
  otp:
    expiry-minutes: 5
    resend-cooldown-seconds: 60
    max-attempts: 3